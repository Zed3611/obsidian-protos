syntax = "proto3";

package gateway.v1;

option go_package = "obsidian.gateway.v1";

service GatewayService {
  rpc SendEvent(SendEventRequest) returns (SendEventResponse);
}

message SendEventRequest {
  string action = 1;
  string json_payload = 2;
  int64 user_id = 3;
}

message SendEventResponse {}
