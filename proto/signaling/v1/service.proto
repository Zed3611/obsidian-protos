syntax = "proto3";

package signaling.v1;

option go_package = "obsidian.signaling.v1";

service SignalingService {
  rpc GetJoinToken(GetJoinTokenRequest) returns (GetJoinTokenResponse);
  rpc DistributeE2EEPublickKey(DistributeE2EEPublickKeyRequest) returns (DistributeE2EEPublickKeyResponse);
  rpc DistributeE2EEEcnryptedMediaKey(DistributeE2EEEcnryptedMediaKeyRequest) returns (DistributeE2EEEcnryptedMediaKeyResponse);
}

// Join room
message GetJoinTokenRequest {
  string room_id = 1;
}

message GetJoinTokenResponse {
  string token = 1;
}

// E2EE
message DistributeE2EEPublickKeyRequest {
  repeated int64 public_key = 1;
  string room_id = 2;
  bool is_first = 3;
}

message DistributeE2EEPublickKeyResponse {}

message DistributeE2EEEcnryptedMediaKeyRequest {
  repeated int64 media_key = 1;
  repeated int64 iv = 2;
  int64 key_index = 3;
  string room_id = 4;
  int64 to_user_id = 5;
}

message DistributeE2EEEcnryptedMediaKeyResponse {}
